aid: safe-agile
name: SAFe Agile
description: >-
  The Scaled Agile Framework (SAFe) is an enterprise-scale agile framework
  developed by Scaled Agile, Inc. that provides guidance for implementing agile
  practices across large organizations with multiple teams. SAFe organizes
  around five core disciplines: Lean Portfolio Management, Team and Technical
  Agility, Product Development Flow, Large Solution Integration and Delivery,
  and Leadership and Culture. Organizations use SAFe to align stakeholders,
  coordinate Agile Release Trains (ARTs), track PI objectives, and accelerate
  delivery of value. SAFe tools integrate with CI/CD pipelines, ERP systems,
  and planning platforms to support enterprise agile transformation.
