        url: https://scaledagile.com/

  - aid: safe-agile:jira-safe
    name: Jira SAFe Integration
    description: >-
      Jira by Atlassian provides SAFe-aligned project management and PI planning
      capabilities through the Advanced Roadmaps feature and SAFe-compatible
      workflows for Agile Release Trains, Epics, Features, and Stories. Jira's
      REST API enables programmatic management of SAFe backlogs, sprints, and
      program increments.
    humanURL: https://www.atlassian.com/agile/safe
    tags:
      - Agile
      - Project Management
      - SAFe
      - PI Planning
      - REST
    properties:
      - type: Documentation
        url: https://developer.atlassian.com/cloud/jira/software/rest/intro/
      - type: Website
        url: https://www.atlassian.com/agile/safe

  - aid: safe-agile:azure-devops-safe
    name: Azure DevOps SAFe Integration
    description: >-
      Azure DevOps provides SAFe-aligned planning and tracking through work item
      types aligned to SAFe hierarchy (Epics, Features, User Stories), delivery
      plans for Program Increment visualization, and REST APIs for programmatic
      access to backlogs, iterations, and boards.
    humanURL: https://learn.microsoft.com/en-us/azure/devops/
    tags:
      - Agile
      - DevOps
      - SAFe
      - REST
    properties:
      - type: Documentation
        url: https://learn.microsoft.com/en-us/azure/devops/integrate/
      - type: Website
        url: https://azure.microsoft.com/en-us/products/devops/

  - aid: safe-agile:planview-safe
    name: Planview SAFe Tool
    description: >-
      Planview provides enterprise agile planning supporting SAFe through its
      portfolio management, Lean flow, and Agile delivery capabilities.
      Enables organizations to connect strategy to delivery across multiple
      ARTs with real-time program board visualization and PI planning support.
    humanURL: https://www.planview.com/resources/articles/safe-agile/
    tags:
      - Agile
      - Portfolio Management
      - SAFe
      - Enterprise Planning
    properties:
      - type: Documentation
        url: https://success.planview.com/
      - type: Website
        url: https://www.planview.com/

  - aid: safe-agile:spiraplan-safe
    name: SpiraPlan SAFe Tool
    description: >-
      SpiraPlan by Inflectra is an enterprise agile portfolio and risk management
      platform that supports SAFe, Nexus, Scrum of Scrums, and LeSS frameworks.
      Provides REST API for programmatic access to portfolio, program, and team
      level planning artifacts.
    humanURL: https://www.inflectra.com/SpiraPlan/
    tags:
