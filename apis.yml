apis:
  - aid: safe-agile:scaledagile-framework
    name: Scaled Agile Framework (SAFe)
    description: >-
      The official Scaled Agile Framework by Scaled Agile, Inc. provides
      comprehensive guidance for enterprise agile transformation including roles,
      events, artifacts, and competencies for Lean Portfolio Management, Agile
      Release Trains, and PI Planning. Includes SAFe CoPilot AI assistant,
      certification programs, and the annual State of SAFe report.
    humanURL: https://framework.scaledagile.com/
    tags:
      - Agile
